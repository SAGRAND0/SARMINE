<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARMINE — Minecraft Сервер</title>
    <style>
        @font-face {
            font-family: 'Minecraftia';
            src: url('Minecraftia.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #080808;
            color: #c0c0c0;
            font-family: 'Minecraftia', 'Courier New', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.25; pointer-events: none;
        }

        .video-fallback {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            background-image: radial-gradient(ellipse at 50% 0%, #1a1a1a 0%, #080808 60%),
                              repeating-linear-gradient(0deg, transparent, transparent 2px, #0c0c0c 2px, #0c0c0c 4px);
            background-size: 100% 100%, 100% 100%;
        }

        .sound-notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff6a00; color: #0a0a0a; padding: 12px 25px; border-radius: 4px;
            font-family: 'Minecraftia', monospace; font-size: 11px; letter-spacing: 1px;
            z-index: 9998; cursor: pointer; transition: all 0.5s; opacity: 1; text-transform: uppercase;
        }
        .sound-notification.hidden { opacity: 0; pointer-events: none; }

        header {
            background: rgba(20,20,20,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid #ff6a00; padding: 0 20px; display: flex;
            justify-content: space-between; align-items: center; height: 60px;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 25px rgba(255,106,0,0.12);
        }

        .logo {
            font-family: 'Minecraftia', monospace; font-size: 20px; font-weight: 900;
            letter-spacing: 2px; color: #fff; text-transform: uppercase; cursor: pointer;
        }
        .logo span { color: #ff6a00; }

        nav { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        nav button {
            background: none; border: none; color: #999; font-family: 'Minecraftia', monospace;
            font-size: 11px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; padding: 6px 0; border-bottom: 2px solid transparent; transition: all 0.3s;
        }
        nav button:hover, nav button.active { color: #ff6a00; border-bottom-color: #ff6a00; }

        .btn-donate {
            background: #ff6a00; color: #0a0a0a !important; padding: 8px 16px;
            border-radius: 4px; font-weight: 700; transition: all 0.3s;
        }
        .btn-donate:hover { background: #ff8533; box-shadow: 0 0 25px rgba(255,106,0,0.4); border-bottom: none !important; }

        .section { display: none; position: relative; z-index: 1; }
        .section.active { display: block; }

        .hero { text-align: center; padding: 60px 20px 30px; }
        .hero h1 { font-family: 'Minecraftia', monospace; font-size: 42px; font-weight: 900; letter-spacing: 4px; color: #fff; text-transform: uppercase; margin-bottom: 8px; }
